# ─────────────────────────────────────────────────────────────────────────────
# Nutri-Baby Docker Compose - Production Configuration
# ─────────────────────────────────────────────────────────────────────────────
# 使用方式:
#   cp .env.selfhosted .env
#   编辑 .env 填入实际配置
#   docker-compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL 数据库 ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nutribaby-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutribaby}
      POSTGRES_USER: ${POSTGRES_USER:-nutribaby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutribabypassword}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    # 挂载本地目录持久化数据
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutribaby} -d ${POSTGRES_DB:-nutribaby}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nutribaby-network
    # 生产环境资源限制
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── Redis 缓存 (可选，用于会话缓存) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nutribaby-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutribaby-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ── API 后端服务 ────────────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
      args:
        - NODE_ENV=production
    container_name: nutribaby-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${API_PORT:-3000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-nutribaby}:${POSTGRES_PASSWORD:-nutribabypassword}@postgres:5432/${POSTGRES_DB:-nutribaby}?sslmode=prefer
      - PRISMA_DATABASE_URL=postgresql://${POSTGRES_USER:-nutribaby}:${POSTGRES_PASSWORD:-nutribabypassword}@postgres:5432/${POSTGRES_DB:-nutribaby}?sslmode=prefer
      - JWT_SECRET=${JWT_SECRET}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MAIL_FROM=${MAIL_FROM:-"Nutri-Baby <noreply@localhost>"}
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - CRON_SECRET=${CRON_SECRET}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # 挂载本地目录存储上传文件
      - ./data/uploads:/app/uploads
      # 挂载本地日志目录
      - ./logs:/app/logs
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nutribaby-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── 前端 Web (Nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
        - VITE_AMAP_KEY=${VITE_AMAP_KEY}
        - VITE_AMAP_SECURITY_CODE=${VITE_AMAP_SECURITY_CODE}
        - VITE_APP_NAME=${VITE_APP_NAME:-Nutri-Baby}
        - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0}
    container_name: nutribaby-frontend
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_SSL_PORT:-443}:443"
    depends_on:
      - api
    networks:
      - nutribaby-network
    deploy:
      resources:
        limits:
          memory: 128M

# ── 网络 ────────────────────────────────────────────────────────────────────
networks:
  nutribaby-network:
    driver: bridge

# ── 数据持久化说明 ──────────────────────────────────────────────────────────
# 数据目录结构:
# ./data/
#   ├── postgres/      # PostgreSQL 数据文件
#   ├── redis/         # Redis 持久化文件
#   └── uploads/       # 用户上传的文件
#
# 日志目录:
# ./logs/
#   ├── api/           # API 服务日志
#   └── nginx/         # Nginx 访问/错误日志
#
# 重要: 请定期备份 ./data 目录!
